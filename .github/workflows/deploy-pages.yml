name: Deploy App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch, tag, or commit SHA). Leave blank for the selected ref.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    outputs:
      deploy_sha: ${{ steps.resolve-ref.outputs.deploy_sha }}
      build_timestamp: ${{ steps.resolve-ref.outputs.build_timestamp }}
      app_version: ${{ steps.resolve-ref.outputs.app_version }}
    steps:
      - name: Checkout deploy ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Resolve deploy metadata
        id: resolve-ref
        run: |
          {
            echo "deploy_sha=$(git rev-parse HEAD)"
            echo "build_timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "app_version=$(node -p 'require("./package.json").version')"
          } >> "$GITHUB_OUTPUT"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ secrets.PANEL_PROXY_ORIGIN }}
          VITE_APP_VERSION: ${{ steps.resolve-ref.outputs.app_version }}
          VITE_BUILD_COMMIT: ${{ steps.resolve-ref.outputs.deploy_sha }}
          VITE_BUILD_TIMESTAMP: ${{ steps.resolve-ref.outputs.build_timestamp }}
          VITE_BASE_PATH: /pagi-pagi-padel-panel/
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-pages:
    name: Deploy GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-worker:
    name: Deploy Cloudflare Worker
    needs: build
    permissions:
      contents: read
      deployments: write
    environment:
      name: cloudflare-worker
      url: https://pagi-pagi-padel-api-proxy.altianogerung.workers.dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deploy commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.build.outputs.deploy_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Cloudflare secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing CLOUDFLARE_ACCOUNT_ID repository secret."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN repository secret."
            exit 1
          fi

      - name: Deploy Worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: >
          pnpm worker:deploy
          --var WORKER_BUILD_COMMIT:${{ needs.build.outputs.deploy_sha }}
          --var WORKER_BUILD_TIMESTAMP:${{ needs.build.outputs.build_timestamp }}
          --var WORKER_VERSION:${{ needs.build.outputs.app_version }}
