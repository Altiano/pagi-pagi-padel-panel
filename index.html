<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fbfcf8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#242520" media="(prefers-color-scheme: dark)" />
    <script>
      // Apply the stored theme preference before first paint to avoid a flash.
      // Keep the storage key in sync with THEME_STORAGE_KEY in src/constants.js.
      (function () {
        try {
          var theme = localStorage.getItem('ppp-panel-theme');
          if (theme === 'light' || theme === 'dark') document.documentElement.dataset.theme = theme;
        } catch (error) {
          // Storage unavailable (private mode): follow the system theme.
        }
      })();
    </script>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Pagi Padel" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="icon" type="image/png" href="%BASE_URL%icons/icon-192.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/apple-touch-icon.png" />
    <title>Pagi Pagi Padel Panel</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
