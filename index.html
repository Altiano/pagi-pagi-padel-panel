<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <!-- Both metas start on the light color to match the default light theme;
         applyThemePreference (src/hooks.js) rewrites them for dark/system. -->
    <meta name="theme-color" content="#f4f6f1" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#f4f6f1" media="(prefers-color-scheme: dark)" />
    <script>
      // Apply the stored theme preference before first paint to avoid a flash.
      // Light is the default; keep the storage key in sync with
      // THEME_STORAGE_KEY in src/constants.js.
      (function () {
        try {
          var theme = localStorage.getItem('ppp-panel-theme');
          if (theme === 'dark' || theme === 'system') document.documentElement.dataset.theme = theme;
        } catch (error) {
          // Storage unavailable (private mode): stay on the light default.
        }
      })();
    </script>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Pagi Padel" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="icon" type="image/png" href="%BASE_URL%icons/icon-192.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/apple-touch-icon.png" />
    <title>Pagi Pagi Padel Panel</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
